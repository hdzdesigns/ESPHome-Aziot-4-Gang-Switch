esphome:
  name: "fourgangswitch"
  friendly_name: "Aziot 4-Gang Switch"

bk72xx:
  board: cb3s # Cleaner specific board definition

logger:

web_server:
captive_portal:

api:
  encryption:
    key: !secret api_key # Recommended for Home Assistant

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Switch-Fallback"
    password: !secret ap_password

# --- STATUS LED ---
status_led:
  pin:
    number: P11
    inverted: true

# --- PHYSICAL BUTTONS ---
binary_sensor:
  - platform: gpio
    id: button_1
    pin:
      number: P24
      inverted: true
      mode: INPUT_PULLUP
    filters:
      - delayed_on: 50ms # Debounce filter
    on_press:
      - switch.toggle: switch_1

  - platform: gpio
    id: button_2
    pin:
      number: P10
      inverted: true
      mode: INPUT_PULLUP
    filters:
      - delayed_on: 50ms 
    on_press:
      - switch.toggle: switch_2

  - platform: gpio
    id: button_3
    pin:
      number: P7
      inverted: true
      mode: INPUT_PULLUP
    filters:
      - delayed_on: 50ms 
    on_press:
      - switch.toggle: switch_3

  - platform: gpio
    id: button_4
    pin:
      number: P26
      inverted: true
      mode: INPUT_PULLUP
    filters:
      - delayed_on: 50ms 
    on_press:
      - switch.toggle: switch_4

# --- RELAYS ---
switch:
  - platform: gpio
    id: switch_1
    name: "Relay 1"
    pin: P14
    restore_mode: RESTORE_DEFAULT_OFF # Remembers state after a power cut

  - platform: gpio
    id: switch_2
    name: "Relay 2"
    pin: P6
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    id: switch_3
    name: "Relay 3"
    pin: P9
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    id: switch_4
    name: "Relay 4"
    pin: P8
    restore_mode: RESTORE_DEFAULT_OFF
    